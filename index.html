<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiTil Studio | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .container {
            text-align: center;
            z-index: 2;
            position: relative;
            max-width: 620px;
            padding: 2rem;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.25);
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00d4ff;
            text-transform: uppercase;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .badge:hover {
            background: rgba(0, 212, 255, 0.15);
            transform: scale(1.05);
        }

        .logo {
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 800;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
            line-height: 1;
        }

        .studio-text {
            font-size: clamp(0.85rem, 2vw, 1rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 2.5rem;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 3rem;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            margin: 0 auto 3rem;
        }

        .coming-soon {
            font-size: 0.95rem;
            color: #475569;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .social-link {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-3px);
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .logo { letter-spacing: -2px; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
    <div class="badge">Indie App &amp; Game Studio</div>

    <div class="logo">TiTil</div>
    <div class="studio-text">Studio</div>

    <div class="divider"></div>

    <p class="subtitle">
        Where engineering meets imagination.<br>
        Building AI-powered games &amp; mobile apps.
    </p>

    <div class="coming-soon">✦ Something extraordinary is coming soon ✦</div>

    <div class="social-links">
        <a href="https://github.com/su7ri" class="social-link" title="GitHub" aria-label="GitHub">
            <svg fill="currentColor" viewBox="0 0 24 24" width="20" height="20">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.553 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
        </a>
        <a href="mailto:contact@titilstudio.com" class="social-link" title="Email" aria-label="Email">
            <svg fill="currentColor" viewBox="0 0 24 24" width="20" height="20">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
        </a>
    </div>
</div>

<script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        const size = (Math.random() * 2 + 0.5) + 'px';
        star.style.width = size;
        star.style.height = size;
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        starsContainer.appendChild(star);
    }
</script>

</body>
</html>
