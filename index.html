<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiTil Studio | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:       #0A1172;
            --navy-mid:   #1a24a0;
            --accent:     #4F8EF7;
            --accent-soft:#7BAAFF;
            --text:       #c8d0f0;
            --text-dim:   #7080b8;
            --border:     rgba(79,142,247,.2);
        }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0d1899 0%, #0A1172 35%, #060b4a 70%, #03062e 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur,3s) infinite var(--delay,0s); }
        @keyframes twinkle {
            0%,100% { opacity:.15; transform:scale(1); }
            50%      { opacity:.9;  transform:scale(1.4); }
        }

        .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 1; animation: drift 12s ease-in-out infinite alternate; }
        .blob-1 { width:500px; height:500px; background:rgba(26,36,160,.35); top:-120px; left:-120px; }
        .blob-2 { width:400px; height:400px; background:rgba(10,17,114,.4); bottom:-100px; right:-100px; animation-delay:-6s; }
        .blob-3 { width:300px; height:300px; background:rgba(79,142,247,.08); top:40%; left:50%; transform:translate(-50%,-50%); }
        @keyframes drift {
            from { transform:translate(0,0) scale(1); }
            to   { transform:translate(40px,30px) scale(1.08); }
        }

        .container { text-align:center; z-index:10; position:relative; max-width:640px; padding:2.5rem 2rem; animation:fadeInUp 1.2s cubic-bezier(.22,1,.36,1) both; }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(50px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(79,142,247,.09); backdrop-filter:blur(12px);
            border:1px solid var(--border); padding:.45rem 1.4rem;
            border-radius:50px; font-size:.72rem; font-weight:600;
            letter-spacing:2.5px; color:var(--accent-soft);
            text-transform:uppercase; margin-bottom:2.5rem; transition:all .3s ease;
        }
        .badge::before {
            content:''; width:7px; height:7px; border-radius:50%;
            background:var(--accent); box-shadow:0 0 8px var(--accent);
            animation:pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.8);} }
        .badge:hover { background:rgba(79,142,247,.18); transform:scale(1.04); }

        .logo-wrap {
            margin-bottom: 0.6rem;
            animation: floatLogo 5s ease-in-out infinite;
        }
        @keyframes floatLogo { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .logo-wrap img {
            width: 220px;
            object-fit: contain;
            filter: drop-shadow(0 0 24px rgba(79,142,247,.5));
        }

        .studio-text {
            font-family:'Raleway', sans-serif;
            font-size:clamp(.75rem,2vw,.9rem); letter-spacing:8px;
            text-transform:uppercase; color:var(--text-dim);
            font-weight:600; margin-bottom:2.8rem;
        }

        .divider { width:60px; height:1.5px; background:linear-gradient(90deg,transparent,var(--accent),transparent); margin:0 auto 2.8rem; border-radius:1px; }

        .subtitle { font-size:clamp(.95rem,2.2vw,1.1rem); line-height:1.9; color:var(--text-dim); margin-bottom:2.8rem; font-weight:300; }
        .subtitle strong { color:var(--text); font-weight:500; }

        .coming-soon { font-size:.8rem; color:rgba(112,128,184,.6); letter-spacing:2px; margin-bottom:2.5rem; font-family:'Raleway',sans-serif; font-weight:500; text-transform:uppercase; }

        .social-links { display:flex; gap:1rem; justify-content:center; margin-top:.5rem; }
        .social-link {
            width:48px; height:48px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            color:var(--text-dim); text-decoration:none;
            border:1px solid rgba(255,255,255,.08);
            backdrop-filter:blur(8px); background:rgba(255,255,255,.03);
            transition:all .3s cubic-bezier(.4,0,.2,1);
        }
        .social-link:hover {
            background:rgba(79,142,247,.15); color:var(--accent-soft);
            border-color:var(--border); transform:translateY(-4px);
            box-shadow:0 8px 24px rgba(79,142,247,.2);
        }

        .bottom-label { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); font-size:.65rem; letter-spacing:2px; color:rgba(112,128,184,.3); text-transform:uppercase; font-family:'Raleway',sans-serif; z-index:10; white-space:nowrap; }

        @media (max-width:480px) { .container{padding:1.5rem;} .logo-wrap img{width:170px;} }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="stars" id="stars"></div>

<div class="container">
    <div class="badge">Indie App &amp; Game Studio</div>

    <div class="logo-wrap">
        <img src="logo_tr.jpg" alt="TiTil"
             style="filter: brightness(0) invert(1) drop-shadow(0 0 24px rgba(79,142,247,.5));">
    </div>

    <div class="studio-text">Studio</div>
    <div class="divider"></div>

    <p class="subtitle">
        Where <strong>engineering</strong> meets <strong>imagination</strong>.<br>
        Building AI-powered games &amp; mobile apps.
    </p>

    <div class="coming-soon">✦ &nbsp; Something extraordinary is coming soon &nbsp; ✦</div>

    <div class="social-links">
        <a href="https://github.com/su7ri" class="social-link" title="GitHub" aria-label="GitHub">
            <svg fill="currentColor" viewBox="0 0 24 24" width="20" height="20"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.553 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
        <a href="mailto:contact@titilstudio.com" class="social-link" title="Email" aria-label="Email">
            <svg fill="currentColor" viewBox="0 0 24 24" width="20" height="20"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </a>
    </div>
</div>

<div class="bottom-label">titilstudio.com</div>

<script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 140; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top  = Math.random() * 100 + '%';
        const size = (Math.random() * 2.2 + 0.4) + 'px';
        s.style.width = size; s.style.height = size;
        s.style.setProperty('--delay', (Math.random() * 4) + 's');
        s.style.setProperty('--dur',   (Math.random() * 3 + 2) + 's');
        if (Math.random() > 0.7) s.style.background = '#a0b8ff';
        container.appendChild(s);
    }
</script>

</body>
</html>
