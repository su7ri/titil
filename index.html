<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiTil Studio | Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* رنگ پس‌زمینه تیره مدرن */
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 1.5s ease-in;
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6); /* گرادیانت آبی به بنفش */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .badge {
            background-color: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Indie App & Game Studio</div>
        <div class="logo">TiTil Studio</div>
        <p class="subtitle">Where engineering meets imagination. We are currently building our next generation of mobile apps and AI-driven games.</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 3rem;">Something awesome is coming...</p>
    </div>
</body>
</html>
